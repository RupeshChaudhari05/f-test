version: '3.8'

# ============================================================
# Coolify deployment guide:
#
# Coolify maps SERVICE_FQDN_<NAME> to set domain for each service.
# Add these in Coolify environment variables:
#
#   SERVICE_FQDN_BACKEND=posh-api.fontgenerator.club
#   SERVICE_FQDN_FRONTEND=posh.fontgenerator.club
#   DB_HOST=i4s8wc0kkoosc4wk8gsogcg4
#   DB_PORT=3306
#   DB_USERNAME=mysql
#   DB_PASSWORD=<your_password>
#   DB_NAME=posh_notifications
#   JWT_SECRET=<your_jwt_secret>
#   VAPID_PUBLIC_KEY=<your_vapid_public_key>
#   VAPID_PRIVATE_KEY=<your_vapid_private_key>
#   VAPID_SUBJECT=mailto:classstatus0@gmail.com
#   DB_SYNC=true          ← REQUIRED on first deploy only
#   SUPER_ADMIN_EMAIL=admin@posh.fontgenerator.club
#   SUPER_ADMIN_PASSWORD=Admin@Posh2026!
#
# IMPORTANT: REDIS_HOST must NOT be set — it's hardcoded to 'redis' below.
# ============================================================

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      DB_TYPE: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-posh_notifications}
      # Redis must point to the internal service name 'redis', never 'localhost'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      # Must include both domains so CORS allows login from the frontend
      CORS_ORIGINS: https://posh.fontgenerator.club,https://posh-api.fontgenerator.club
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      # DB_SYNC=true auto-creates all MySQL tables on first deploy
      # After first successful login, change to false and redeploy
      DB_SYNC: ${DB_SYNC:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@posh.fontgenerator.club}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-Admin@Posh2026!}
      FRONTEND_URL: https://posh.fontgenerator.club
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js browser bundle at build time so browser calls
        # posh-api.fontgenerator.club directly — not routed through posh.fontgenerator.club
        NEXT_PUBLIC_API_URL: https://posh-api.fontgenerator.club
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://posh-api.fontgenerator.club
    ports:
      - "3001:3001"

volumes:
  redis_data:
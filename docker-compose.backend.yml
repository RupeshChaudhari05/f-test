version: '3.8'

services:
  backend:
    image: posh-notification-backend:latest
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-your_db_host}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-posh}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-posh_notifications}
      REDIS_HOST: ${REDIS_HOST:-your_redis_host}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://posh.fontgenerator.club}
    ports:
      - "3000:3000"

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: sqlite
      DB_DATABASE: /app/data/database.sqlite
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://posh.fontgenerator.club}
      JWT_SECRET: ${JWT_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@posh.fontgenerator.club}
    volumes:
      - sqlite_data:/app/data
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${BACKEND_URL:-https://posh.fontgenerator.club}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-https://posh.fontgenerator.club}
    ports:
      - "3001:3001"

volumes:
  sqlite_data:
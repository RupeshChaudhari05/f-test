worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=sdk:10m rate=60r/s;

    upstream backend {
        server backend:3000;
    }

    upstream frontend {
        server frontend:3001;
    }

    # Redirect HTTP → HTTPS for frontend
    server {
        listen 80;
        server_name posh.fontgenerator.club;
        return 301 https://$host$request_uri;
    }

    # Redirect HTTP → HTTPS for API
    server {
        listen 80;
        server_name posh-api.fontgenerator.club;
        return 301 https://$host$request_uri;
    }

    # HTTPS — Frontend Dashboard (posh.fontgenerator.club)
    server {
        listen 443 ssl http2;
        server_name posh.fontgenerator.club;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # API routes - redirect to backend domain
        location /api/ {
            return 301 https://posh-api.fontgenerator.club$request_uri;
        }

        # Frontend routes
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://frontend;
        }
    }

    # HTTPS — Backend API (posh-api.fontgenerator.club)
    server {
        listen 443 ssl http2;
        server_name posh-api.fontgenerator.club;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # API routes
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SDK static files
        location /sdk/ {
            limit_req zone=sdk burst=100 nodelay;
            proxy_pass http://backend;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin "*";
        }

        # Health check
        location /health {
            proxy_pass http://backend/api/v1/health;
        }
    }
}

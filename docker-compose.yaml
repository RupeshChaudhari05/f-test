version: '3.8'

# ============================================================
# Coolify deployment — set these env vars in Coolify UI:
#   DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD, DB_NAME
#   JWT_SECRET, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT
#   BACKEND_URL=https://posh-api.fontgenerator.club
#   CORS_ORIGINS=https://posh.fontgenerator.club,https://posh-api.fontgenerator.club
#   DB_SYNC=true   ← REQUIRED on first deploy to create MySQL tables
#   SUPER_ADMIN_EMAIL=admin@posh.fontgenerator.club
#   SUPER_ADMIN_PASSWORD=Admin@Posh2026!
# After first login: set DB_SYNC=false and redeploy.
# ============================================================

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      # Database — always MySQL on this deployment
      DB_TYPE: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-posh_notifications}
      # Redis — always use internal Docker service name, never 'localhost'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://posh.fontgenerator.club}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      # DB_SYNC=true creates MySQL tables automatically on first deploy
      # Set to true in Coolify for first deploy, then change to false
      DB_SYNC: ${DB_SYNC:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@posh.fontgenerator.club}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-Admin@Posh2026!}
      FRONTEND_URL: ${FRONTEND_URL:-https://posh.fontgenerator.club}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js browser bundle at build time so browser calls
        # posh-api.fontgenerator.club directly — not routed through posh.fontgenerator.club
        NEXT_PUBLIC_API_URL: https://posh-api.fontgenerator.club
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # BACKEND_INTERNAL_URL: Docker-internal URL — Next.js uses this at runtime
      # to proxy /api/* requests to the backend container (never goes through internet)
      BACKEND_INTERNAL_URL: http://backend:3000
      NEXT_PUBLIC_API_URL: ${BACKEND_URL:-https://posh-api.fontgenerator.club}
    ports:
      - "3001:3001"

volumes:
  redis_data:
